# Olaytech Decap CMS configuration
# Netlify Identity + Git Gateway backend is enabled.
# Use Netlify Identity to invite admin users, and Git Gateway to save CMS changes to GitHub.

backend:
  name: git-gateway
  branch: main

local_backend: true
publish_mode: editorial_workflow
media_folder: "assets/uploads"
public_folder: "/assets/uploads"
site_url: "https://gregarious-sprinkles-db2dfe.netlify.app"
display_url: "https://gregarious-sprinkles-db2dfe.netlify.app"
logo_url: "/assets/brand/olay-logo-black.png"

collections:
  - name: "products"
    label: "Products 产品管理"
    label_singular: "Product 产品"
    folder: "data/products"
    create: true
    delete: true
    extension: "json"
    format: "json"
    identifier_field: "title"
    slug: "{{fields.slug}}"
    summary: "{{title}} · {{typeGroup}} · {{materialGroup}} · {{applicationGroup}}"
    sortable_fields: ["title", "updatedAt", "productType", "material", "status"]
    fields:
      - { label: "Product Title 产品名称", name: "title", widget: "string" }
      - { label: "Slug 文件名/URL标识", name: "slug", widget: "string", hint: "Lowercase English only, use hyphen. Example: clear-eva-makeup-pouch" }
      - { label: "Card Title 产品卡片标题", name: "cardTitle", widget: "string", required: false, hint: "Optional. If blank, the product title will be used on catalog cards." }
      - { label: "Card Subtitle 产品卡片小标题", name: "cardSubtitle", widget: "text", required: false, hint: "Shown under the title on By Type / By Material / By Application product cards. Example: Soft neoprene pouch · Custom logo · OEM bulk order" }
      - label: "Main Type 主类型自动分类"
        name: "typeGroup"
        widget: "select"
        required: false
        options: ["Cosmetic Bags", "Toiletry Bags", "Shopping Bags", "Cooler Bags", "Sports Bags", "Drawstring Bags", "Travel Organizers", "Card Binder Cases", "Care Binder", "Custom OEM Bags", "Other Custom Bags"]
      - label: "Type Tags 更多类型标签"
        name: "typeTags"
        widget: "list"
        required: false
        field: { label: "Type", name: "type", widget: "select", options: ["Cosmetic Bags", "Toiletry Bags", "Shopping Bags", "Cooler Bags", "Sports Bags", "Drawstring Bags", "Travel Organizers", "Card Binder Cases", "Care Binder", "Custom OEM Bags", "Other Custom Bags"] }
      - label: "Main Material 主材质自动分类"
        name: "materialGroup"
        widget: "select"
        required: false
        options: ["Cotton / Canvas", "Nylon", "Oxford", "PVC / EVA / TPU", "Neoprene", "RPET", "PU Leather", "Felt", "Non Woven", "Polyester", "Velvet / Satin", "Tyvek", "Mesh", "Other Materials"]
      - label: "Material Tags 更多材质标签"
        name: "materialTags"
        widget: "list"
        required: false
        field: { label: "Material", name: "material", widget: "select", options: ["Cotton / Canvas", "Nylon", "Oxford", "PVC / EVA / TPU", "Neoprene", "RPET", "PU Leather", "Felt", "Non Woven", "Polyester", "Velvet / Satin", "Tyvek", "Mesh", "Other Materials"] }
      - label: "Main Application 主应用场景自动分类"
        name: "applicationGroup"
        widget: "select"
        required: false
        options: ["Beauty & Cosmetic", "Travel & Toiletry", "Retail & Promotion", "Food & Cooler", "Outdoor & Sports", "Card & Document Storage", "Corporate Gifts", "Office & School", "Event Giveaway", "Other Applications"]
      - label: "Application Tags 更多应用场景标签"
        name: "applicationTags"
        widget: "list"
        required: false
        field: { label: "Application", name: "application", widget: "select", options: ["Beauty & Cosmetic", "Travel & Toiletry", "Retail & Promotion", "Food & Cooler", "Outdoor & Sports", "Card & Document Storage", "Corporate Gifts", "Office & School", "Event Giveaway", "Other Applications"] }
      - { label: "Status 状态", name: "status", widget: "select", options: ["draft", "published"], default: "published" }
      - { label: "Old Static Page 原静态页面", name: "sourcePage", widget: "string", required: false }
      - { label: "Public Page URL 公开页面", name: "pageUrl", widget: "string", required: false, hint: "Existing HTML page or product-managed.html?slug=xxx" }
      - { label: "Item No. 货号", name: "itemNo", widget: "string", required: false }
      - { label: "Category 分类", name: "category", widget: "string", required: false }
      - { label: "Product Type 产品类型", name: "productType", widget: "string", required: false }
      - { label: "Application 应用场景", name: "application", widget: "string", required: false }
      - { label: "Material 材质", name: "material", widget: "string", required: false }
      - { label: "Color 颜色", name: "color", widget: "string", required: false }
      - { label: "Size 尺寸", name: "size", widget: "string", required: false }
      - { label: "Logo Method LOGO工艺", name: "logo", widget: "string", required: false }
      - { label: "MOQ 起订量", name: "moq", widget: "string", required: false }
      - { label: "Main Image 主图", name: "mainImage", widget: "image", required: false }
      - label: "Gallery Images 详情图"
        name: "gallery"
        widget: "list"
        required: false
        field: { label: "Image 图片", name: "image", widget: "image" }
      - { label: "Product Description 产品描述", name: "description", widget: "text", required: false }
      - { label: "SEO Title SEO标题", name: "seoTitle", widget: "string", required: false }
      - { label: "SEO Description SEO描述", name: "seoDescription", widget: "text", required: false }
      - label: "Keywords 关键词"
        name: "keywords"
        widget: "list"
        required: false
        field: { label: "Keyword", name: "keyword", widget: "string" }
      - { label: "Updated At 更新时间", name: "updatedAt", widget: "datetime", required: false, format: "YYYY-MM-DD" }
      - { label: "Internal Notes 内部备注", name: "notes", widget: "text", required: false }

  - name: "site_settings"
    label: "Site Settings 网站设置"
    files:
      - label: "Basic Site Settings 基础设置"
        name: "settings"
        file: "data/site-settings.json"
        format: "json"
        fields:
          - { label: "Site Name 网站名", name: "siteName", widget: "string" }
          - { label: "Domain 域名", name: "domain", widget: "string" }
          - { label: "Email 邮箱", name: "email", widget: "string" }
          - { label: "WhatsApp", name: "whatsapp", widget: "string" }
          - { label: "GA4 Measurement ID", name: "ga4Id", widget: "string", required: false, hint: "Example: G-XXXXXXXXXX" }
          - { label: "Search Console Verified", name: "searchConsoleVerified", widget: "boolean", required: false }
          - { label: "Notes 备注", name: "notes", widget: "text", required: false }
