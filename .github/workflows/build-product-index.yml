name: Build product index

on:
  push:
    paths:
      - "data/products/**"
      - "scripts/build-products-index.py"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-product-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Rebuild managed product index and sitemap
        run: python scripts/build-products-index.py
      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/products-index.json sitemap-products-generated.xml
          git diff --cached --quiet || git commit -m "Update managed product index"
          git push
